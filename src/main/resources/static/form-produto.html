<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário Produto</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box;}
        button { padding: 10px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 id="titulo">Adicionar Produto</h2>

    <div class="form-group">
        <label>Nome:</label>
        <input type="text" id="nome">
    </div>
    <div class="form-group">
        <label>Descrição:</label>
        <input type="text" id="descricao">
    </div>
    <div class="form-group">
        <label>Preço:</label>
        <input type="number" step="0.01" id="preco">
    </div>
    <div class="form-group">
        <label>Categoria:</label>
        <input type="text" id="categoria">
    </div>
    <div class="form-group">
        <label>Estoque:</label>
        <input type="number" id="estoque">
    </div>

    <button onclick="salvarProduto()">Salvar</button>
    <a href="consultar-dados.html" style="margin-left: 10px;">Cancelar</a>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const produtoId = urlParams.get('id');

    if (produtoId) {
        document.getElementById('titulo').innerText = "Editar Produto";
        carregarProduto(produtoId);
    }

    function carregarProduto(id) {
        fetch(`/produtos/${id}`)
            .then(res => res.json())
            .then(produto => {
                document.getElementById('nome').value = produto.nome;
                document.getElementById('descricao').value = produto.descricao;
                document.getElementById('preco').value = produto.preco;
                document.getElementById('categoria').value = produto.categoria;
                document.getElementById('estoque').value = produto.estoque;
            });
    }

    function salvarProduto() {
        const produto = {
            nome: document.getElementById('nome').value,
            descricao: document.getElementById('descricao').value,
            preco: document.getElementById('preco').value,
            categoria: document.getElementById('categoria').value,
            estoque: document.getElementById('estoque').value
        };

        const method = produtoId ? 'PUT' : 'POST';
        const url = produtoId ? `/produtos/${produtoId}` : '/produtos';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(produto)
        }).then(response => {
            if(response.ok) {
                alert('Produto salvo com sucesso!');
                window.location.href = 'consultar-dados.html';
            } else {
                alert('Erro ao salvar produto.');
            }
        });
    }
</script>
</body>
</html>
