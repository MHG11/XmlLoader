<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário Cliente</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: auto;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box;}
        button { padding: 10px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <h2 id="titulo">Adicionar Cliente</h2>

    <div class="form-group">
        <label>Nome:</label>
        <input type="text" id="nome">
    </div>
    <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email">
    </div>
    <div class="form-group">
        <label>Endereço:</label>
        <input type="text" id="endereco">
    </div>
    <div class="form-group">
        <label>Telefone:</label>
        <input type="text" id="telefone">
    </div>

    <button onclick="salvarCliente()">Salvar</button>
    <a href="consultar-dados.html" style="margin-left: 10px;">Cancelar</a>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const clienteId = urlParams.get('id');

    if (clienteId) {
        document.getElementById('titulo').innerText = "Editar Cliente";
        carregarCliente(clienteId);
    }

    function carregarCliente(id) {
        fetch(`/clientes/${id}`)
            .then(res => res.json())
            .then(cliente => {
                document.getElementById('nome').value = cliente.nome;
                document.getElementById('email').value = cliente.email;
                document.getElementById('endereco').value = cliente.endereco;
                document.getElementById('telefone').value = cliente.telefone;
            });
    }

    function salvarCliente() {
        const cliente = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('email').value,
            endereco: document.getElementById('endereco').value,
            telefone: document.getElementById('telefone').value
        };

        const method = clienteId ? 'PUT' : 'POST';
        const url = clienteId ? `/clientes/${clienteId}` : '/clientes';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cliente)
        }).then(response => {
            if(response.ok) {
                alert('Cliente salvo com sucesso!');
                window.location.href = 'consultar-dados.html';
            } else {
                alert('Erro ao salvar cliente.');
            }
        });
    }
</script>
</body>
</html>
