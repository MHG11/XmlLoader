<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Consultar Dados</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .actions a, .actions button { margin-right: 10px; cursor: pointer; }
        button.delete { color: red; }
    </style>
</head>
<body>

    <h1>Consulta de Dados</h1>
    <a href="index.html">Voltar para Upload</a>

    <h2>Clientes</h2>
    <a href="form-cliente.html">Adicionar Novo Cliente</a>
    <table id="tabelaClientes">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Endereço</th>
                <th>Telefone</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>

    <h2>Produtos</h2>
    <a href="form-produto.html">Adicionar Novo Produto</a>
    <table id="tabelaProdutos">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Descrição</th>
                <th>Preço</th>
                <th>Categoria</th>
                <th>Estoque</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        carregarClientes();
        carregarProdutos();
    });

    function carregarClientes() {
        fetch('/clientes/todos')
            .then(res => res.json())
            .then(clientes => {
                const tbody = document.querySelector('#tabelaClientes tbody');
                tbody.innerHTML = '';
                clientes.forEach(cliente => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${cliente.id}</td>
                            <td>${cliente.nome}</td>
                            <td>${cliente.email}</td>
                            <td>${cliente.endereco}</td>
                            <td>${cliente.telefone}</td>
                            <td class="actions">
                                <a href="form-cliente.html?id=${cliente.id}">Editar</a>
                                <button class="delete" onclick="deletarCliente(${cliente.id})">Excluir</button>
                            </td>
                        </tr>
                    `;
                });
            });
    }

    function carregarProdutos() {
        fetch('/produtos/todos')
            .then(res => res.json())
            .then(produtos => {
                const tbody = document.querySelector('#tabelaProdutos tbody');
                tbody.innerHTML = '';
                produtos.forEach(produto => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${produto.id}</td>
                            <td>${produto.nome}</td>
                            <td>${produto.descricao}</td>
                            <td>${produto.preco}</td>
                            <td>${produto.categoria}</td>
                            <td>${produto.estoque}</td>
                            <td class="actions">
                                <a href="form-produto.html?id=${produto.id}">Editar</a>
                                <button class="delete" onclick="deletarProduto(${produto.id})">Excluir</button>
                            </td>
                        </tr>
                    `;
                });
            });
    }

    function deletarCliente(id) {
        if(confirm('Tem certeza que deseja excluir este cliente?')) {
            fetch(`/clientes/${id}`, { method: 'DELETE' })
                .then(() => carregarClientes());
        }
    }

    function deletarProduto(id) {
        if(confirm('Tem certeza que deseja excluir este produto?')) {
            fetch(`/produtos/${id}`, { method: 'DELETE' })
                .then(() => carregarProdutos());
        }
    }
</script>
</body>
</html>
